<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>Meldian Chat</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 500px; height: 100vh; background: white; display: flex; flex-direction: column; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #eee; }
        .chat-body { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 15px; max-width: 70%; font-size: 14px; }
        .me { align-self: flex-end; background: #ECBA1E; color: black; border-radius: 15px 15px 2px 15px; }
        .other { align-self: flex-start; background: #7A5A33; color: white; border-radius: 15px 15px 15px 2px; }
        .input-area { padding: 10px 15px; display: flex; gap: 8px; border-top: 1px solid #eee; }
        input { flex: 1; border: 1px solid #7A5A33; border-radius: 20px; padding: 8px 15px; outline: none; }
        button { background: #ECBA1E; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div style="width: 45px; height: 45px; borderRadius: 50%; background: linear-gradient(45deg, #7A5A33, #ECBA1E); margin-right: 15px;"></div>
            <div>
                <div style="font-weight: bold; color: #7A5A33;">Meldian</div>
                <div style="font-size: 11px; color: #4CAF50;">online</div>
            </div>
        </div>
        <div id="chatbox" class="chat-body"></div>
        <div class="input-area">
            <input id="input" placeholder="စာရိုက်ပါ...">
            <button id="sendBtn">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // မင်းရဲ့ Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBzslry5_ZrlWh2ecKp4Zul9JeurCqc4sc",
            authDomain: "meadow-chatting.firebaseapp.com",
            projectId: "meadow-chatting",
            storageBucket: "meadow-chatting.firebasestorage.app",
            messagingSenderId: "447961594266",
            appId: "1:447961594266:web:c3a47c2851151fcec8a223"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const chatbox = document.getElementById('chatbox');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');

        // Firestore ကနေ အချက်အလက်တွေ Real-time ဆွဲယူမယ်
        const q = query(collection(db, "Messages"), orderBy("createdAt", "asc"));
        onSnapshot(q, (snapshot) => {
            chatbox.innerHTML = '';
            snapshot.docs.forEach(doc => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = 'msg me'; 
                div.innerText = data.text;
                chatbox.appendChild(div);
            });
            chatbox.scrollTop = chatbox.scrollHeight;
        });

        // စာပို့မယ်
        sendBtn.onclick = async () => {
            if(input.value.trim()) {
                await addDoc(collection(db, "Messages"), {
                    text: input.value,
                    createdAt: serverTimestamp()
                });
                input.value = '';
            }
        };
    </script>
</body>
</html>
